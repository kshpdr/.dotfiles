set -g mouse on
focus-events on

# --- Prefix: Ctrl-Space instead of Ctrl-b ---
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix    # press Ctrl-Space twice to send a literal Ctrl-Space

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha'

# Compact window tabs (number tucked on the right, rounded separators)
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"

# Load plugins
run '~/.tmux/plugins/tpm/tpm'

# --- Applied AFTER plugins load ---
set -g status-position top          # bar on top
set -g status-left ""               # drop the left chunk
set -g status-right "#{E:@catppuccin_status_session}"   # just session name on the right
set -g status-right-length 40
